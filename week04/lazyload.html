<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading</title>
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
</head>

<body>
    <main>
        <h1>Lazy Picture in Display</h1>

        <picture>
            <img src="https://unsplash.com/photos/man-working-at-desk-with-laptop-and-phone-pqMPnPo4_ZA" alt="placeholder images" loading="lazy" width="400" height="600">
            <img src="https://unsplash.com/photos/geometric-yellow-triangles-receding-into-darkness-SdQcxv7a8Xw" alt="placeholder images" loading="lazy" width="400" height="600">
            <img src="https://unsplash.com/photos/two-women-talking-in-a-kitchen-while-cooking-3c_k7h8YgHwmages/Lazy 3.jpg" alt="placeholder images" loading="lazy" width="400" height="600">
            <img src="https://unsplash.com/photos/a-bright-yellow-coop-grocery-store-facade-wVoC01eJ7Gg" alt="placeholder images" loading="lazy" width="400" height="600">
            <img src="https://unsplash.com/photos/a-close-up-of-a-palm-tree-with-a-blue-sky-in-the-background-2QcV6upokPA" alt="placeholder images" loading="lazy" width="400" height="600">
            <img src="https://unsplash.com/photos/sailboat-on-the-water-near-buildings-and-a-green-boat-IsK-7TSyV-E" alt="placeholder images" loading="lazy" width="400" height="600">
        </picture>
    </main>

    <footer>
        <p>©<span id="CurrentYear"></span> | Udoeyen OKON | Nigeria</p>

    </footer>
</body>

</html>
